services:
  # ============================================================
  # Backend Services
  # ============================================================
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      args:
        TARGET_APP: gateway
    container_name: relayflow-gateway
    restart: unless-stopped
    # Allow containers to reach host-machine services (PG + Redis)
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 4001
      # Points to your host-machine PostgreSQL
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@host.docker.internal:${DB_PORT:-5432}/${DB_NAME:-relayflow}
      # Points to your host-machine Redis
      REDIS_HOST: host.docker.internal
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VIBE_APP_ID: ${VIBE_APP_ID:-}
      VIBE_SECRET_KEY: ${VIBE_SECRET_KEY:-}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      BUCKET_URL: ${BUCKET_URL:-https://bucket.umangsailor.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.in}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-service@sailorlabs.in}
      SMTP_PASS: ${SMTP_PASS:-Z69DGFnj4HRh}
    networks:
      - relayflow

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile
    container_name: relayflow-worker
    restart: unless-stopped
    # Allow containers to reach host-machine services (PG + Redis)
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      # Points to your host-machine PostgreSQL
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@host.docker.internal:${DB_PORT:-5432}/${DB_NAME:-relayflow}
      # Points to your host-machine Redis
      REDIS_HOST: host.docker.internal
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VIBE_APP_ID: ${VIBE_APP_ID:-}
      VIBE_SECRET_KEY: ${VIBE_SECRET_KEY:-}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.in}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-service@sailorlabs.in}
      SMTP_PASS: ${SMTP_PASS:-Z69DGFnj4HRh}
    networks:
      - relayflow

  # ============================================================
  # Frontend
  # ============================================================
  chat-web:
    build:
      context: .
      dockerfile: apps/chat-web/Dockerfile
      args:
        NEXT_PUBLIC_VIBE_APP_ID: ${NEXT_PUBLIC_VIBE_APP_ID:-}
        NEXT_PUBLIC_VIBE_PUBLIC_KEY: ${NEXT_PUBLIC_VIBE_PUBLIC_KEY:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
        NEXT_PUBLIC_BUCKET_URL: ${NEXT_PUBLIC_BUCKET_URL:-https://bucket.umangsailor.com}
    container_name: relayflow-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
    depends_on:
      - gateway
    networks:
      - relayflow

  # ============================================================
  # Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: relayflow-nginx
    restart: unless-stopped
    ports:
      - '${APP_PORT:-2100}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat-web
      - gateway
    networks:
      - relayflow

networks:
  relayflow:
    driver: bridge
