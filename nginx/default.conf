upstream chat_web {
    server chat-web:3000;
}

upstream gateway {
    server gateway:4001;
}

server {
    listen 80;
    server_name _;

    # ── WebSocket / Socket.io ──────────────────────────────────────────────────
    # Must come before the /api block because socket.io uses /socket.io path
    location /socket.io/ {
        proxy_pass         http://gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API  (/api/...) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Swagger Docs  (/docs) ─────────────────────────────────────────────────
    location /docs {
        proxy_pass         http://gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js Frontend  (everything else → /) ───────────────────────────────
    location / {
        proxy_pass         http://chat_web;
        proxy_http_version 1.1;
        # Required for Next.js HMR websocket in dev (noop in prod standalone)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
